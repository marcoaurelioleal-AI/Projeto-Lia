services:
  - type: web
    name: projeto-lia-v2
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projeto-lia-db
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: lax
      - key: LIA_ADMIN_USER
        value: admin
      - key: LIA_ADMIN_PASSWORD
        sync: false
      - key: LIA_LEADERSHIP_USER
        value: lideranca
      - key: LIA_LEADERSHIP_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MODELO_GEMINI
        value: gemini-2.5-flash
      - key: FRONTEND_ORIGINS
        value: https://projeto-lia-v2.onrender.com

databases:
  - name: projeto-lia-db
    plan: free
    databaseName: projeto_lia
