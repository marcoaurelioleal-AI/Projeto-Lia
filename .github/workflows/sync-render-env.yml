name: Sync Render environment

on:
  workflow_dispatch: {}

jobs:
  sync-render-env:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      LIA_LEADERSHIP_PASSWORD: ${{ secrets.LIA_LEADERSHIP_PASSWORD }}
    steps:
      - name: Validate required secrets
        run: |
          test -n "$RENDER_API_KEY"
          test -n "$RENDER_SERVICE_ID"
          test -n "$LIA_LEADERSHIP_PASSWORD"

      - name: Update leadership variables on Render
        run: |
          update_env() {
            local key="$1"
            local value="$2"
            ENV_VALUE="$value" python -c 'import json, os; print(json.dumps({"value": os.environ["ENV_VALUE"]}))' > payload.json
            curl --fail-with-body --show-error --silent --retry 3 --retry-delay 5 -X PUT \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              --data @payload.json \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars/${key}"
            rm -f payload.json
          }

          update_env "LIA_LEADERSHIP_USER" "lideranca"
          update_env "LIA_LEADERSHIP_PASSWORD" "$LIA_LEADERSHIP_PASSWORD"

      - name: Trigger Render deploy
        run: |
          curl --fail-with-body --show-error --silent --retry 3 --retry-delay 5 -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"
